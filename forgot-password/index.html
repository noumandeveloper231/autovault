<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — AutoVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0b0e14; --card:#12161b; --border:#232a32; --text:#eaecef; --muted:#8b95a1; --green:#2c9257; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(1200px 600px at 20% -10%, #173021, transparent), var(--bg); color:var(--text); font-family:Inter,system-ui,sans-serif; }
    .card { width:min(420px,92vw); background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px; }
    h1 { font-family:"Space Grotesk",sans-serif; font-size:26px; margin:0 0 8px; }
    p { color:var(--muted); font-size:14px; line-height:1.5; margin:0 0 18px; }
    label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; }
    input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:#0f1419; color:var(--text); margin-bottom:14px; }
    button { width:100%; border:0; border-radius:10px; padding:12px; background:var(--green); color:#fff; font-weight:700; cursor:pointer; }
    a { color:#46d392; text-decoration:none; font-size:13px; }
    .msg { margin-top:12px; font-size:13px; color:#46d392; display:none; }
    .err { color:#ff7b7b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset password</h1>
    <p>Enter your account email. If it exists, we will send a reset link.</p>
    <form id="form">
      <label for="email">Email</label>
      <input id="email" type="email" required placeholder="you@dealership.com" />
      <button type="submit">Send reset link</button>
    </form>
    <p class="msg" id="msg"></p>
    <p style="margin-top:16px"><a href="/login">Back to login</a></p>
  </div>
  <script src="/api.js"></script>
  <script>
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.style.display = "block";
      msg.className = "msg";
      try {
        await AVApi.forgotPassword(document.getElementById("email").value.trim());
        msg.textContent = "If that email is registered, a reset link has been sent.";
      } catch (err) {
        msg.className = "msg err";
        msg.textContent = err.message || "Something went wrong.";
      }
    });
  </script>
</body>
</html>
